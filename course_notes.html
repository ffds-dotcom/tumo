<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Course Notes</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #18181b;
      --muted: #71717a;
      --line: #e4e4e7;
      --soft: #f7f7f8;
      --accent: #0f766e;
      --accent-soft: #e6f4f1;
      --active-line: #99d6cd;
      --sidebar-width: 260px;
    }

    html,
    body {
      height: 100%;
    }

    body {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      min-height: 100vh;
      background: #ffffff;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .notes-nav {
      height: 100vh;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfc 100%);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .nav-header {
      padding: 24px 20px 18px;
      border-bottom: 1px solid var(--line);
    }

    .nav-header h1 {
      font-size: 18px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: 0;
    }

    .nav-header p {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .tab-list {
      display: grid;
      gap: 4px;
      padding: 14px 10px;
    }

    .nav-footer {
      margin-top: auto;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
    }

    .drive-link {
      color: var(--accent);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.2;
      text-decoration: none;
    }

    .drive-link:hover {
      text-decoration: underline;
    }

    .language-panel {
      padding: 14px 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .language-label {
      display: block;
      padding: 0 10px 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .language-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
    }

    .language-tab {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--muted);
      cursor: pointer;
      font-size: 21px;
      font-weight: 750;
      letter-spacing: 0;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .language-tab:hover {
      background: var(--soft);
      color: var(--ink);
    }

    .language-tab.active {
      background: var(--accent-soft);
      border-color: var(--active-line);
      color: var(--accent);
    }

    .note-tab {
      width: 100%;
      min-height: 54px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      padding: 12px;
      display: grid;
      align-items: center;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .note-tab:hover {
      background: var(--soft);
      border-color: var(--line);
    }

    .note-tab.active {
      background: var(--accent-soft);
      border-color: var(--active-line);
      color: #0b5f58;
    }

    .note-title {
      font-size: 18px;
      font-weight: 750;
      line-height: 1.18;
    }

    .viewer-wrap {
      min-width: 0;
      height: 100vh;
      background: #ffffff;
    }

    .note-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .no-script {
      padding: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 760px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .notes-nav {
        width: 100%;
        height: auto;
        max-height: 35vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .nav-header {
        padding: 16px 16px 12px;
      }

      .tab-list {
        grid-auto-flow: column;
        grid-auto-columns: minmax(170px, 1fr);
        overflow-x: auto;
        padding: 10px;
      }

      .nav-footer {
        padding: 8px 14px 12px;
      }

      .language-panel {
        padding: 10px;
      }

      .note-tab {
        min-height: 52px;
      }

      .viewer-wrap {
        height: 100%;
        min-height: 0;
      }
    }
  </style>
</head>

          'day-1-mac-shortcuts': 'Mac',
          'day-1-terminal-shortcuts': 'Terminal',
          'day-2-git-basics': 'Git',
          'day-2-claude-shortcuts': 'Claude Code',
          'day-3-github-setup': 'Настройка GitHub',
          'day-1-setup': 'День 1: настройка'
        }
      }
    };

    function getShellText() {
      return shellTranslations[currentLang] || shellTranslations.en;
    }

    function getShellNoteTitle(noteId) {
      return getShellText().notes[noteId] || shellTranslations.en.notes[noteId] || getNote(noteId).title;
    }

    function updateShellLanguage() {
      const text = getShellText();
      const activeId = tabs.find((tab) => tab.classList.contains('active'))?.dataset.noteId || notes[0].id;

      document.documentElement.lang = currentLang;
      navTitle.textContent = text.appTitle;
      languageLabel.textContent = text.languageLabel;
      notesNav.setAttribute('aria-label', text.courseNotesLabel);
      languagePanel.setAttribute('aria-label', text.languagePanelLabel);
      languageGroup.setAttribute('aria-label', text.languageSelectorLabel);
      tabList.setAttribute('aria-label', text.lessonsLabel);
      driveLink.textContent = text.driveLinkLabel;
      driveLink.setAttribute('aria-label', text.driveLinkLabel);

      languageTabs.forEach((tab) => {
        const label = text.languageNames[tab.dataset.lang] || shellTranslations.en.languageNames[tab.dataset.lang];
        tab.setAttribute('aria-label', label);
        tab.querySelector('.visually-hidden').textContent = label;
      });

      tabs.forEach((tab) => {
        tab.querySelector('.note-title').textContent = getShellNoteTitle(tab.dataset.noteId);
      });

      frame.title = getShellNoteTitle(activeId);
      document.title = `${getShellNoteTitle(activeId)} - ${text.appTitle}`;
    }

    function decodeHtml(encodedHtml) {
      const binary = atob(encodedHtml);
      const bytes = new Uint8Array(binary.length);

      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }

      return decoder.decode(bytes);
    }

    function prepareNoteHtml(html) {
      const style = '<style id="combined-notes-frame-style">.language-flags{display:none!important;}</style>';
      return html.replace('</head>', style + '</head>');
    }

    function getNote(id) {
      const noteId = noteAliases[id] || id;
      return notes.find((note) => note.id === noteId) || notes[0];
    }

    function applyFrameLanguage() {
      const win = frame.contentWindow;

      if (!win) return;

      try {
        if (typeof win.setLanguage === 'function') {
          win.setLanguage(currentLang);
        } else if (typeof win.setLang === 'function') {
          win.setLang(currentLang);
        } else {
          frame.contentDocument?.querySelector(`.language-flags button[data-lang="${currentLang}"]`)?.click();
        }
      } catch (error) {
        // The iframe is srcdoc and same-origin in normal use; ignore transient load timing.
      }
    }

    function setLanguage(lang) {
      currentLang = lang;

      languageTabs.forEach((tab) => {
        const isActive = tab.dataset.lang === lang;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });

      updateShellLanguage();
      applyFrameLanguage();
    }

    function activateNote(id, pushHash = true) {
      const note = getNote(id);
      frame.title = getShellNoteTitle(note.id);
      frame.srcdoc = prepareNoteHtml(decodeHtml(note.encodedHtml));
      document.title = `${getShellNoteTitle(note.id)} - ${getShellText().appTitle}`;

      tabs.forEach((tab) => {
        const isActive = tab.dataset.noteId === note.id;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-current', isActive ? 'page' : 'false');
      });

      if (pushHash && window.location.hash !== '#' + note.id) {
        history.replaceState(null, '', '#' + note.id);
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => activateNote(tab.dataset.noteId));
    });

    languageTabs.forEach((tab) => {
      tab.addEventListener('click', () => setLanguage(tab.dataset.lang));
    });

    frame.addEventListener('load', applyFrameLanguage);

    window.addEventListener('hashchange', () => {
      activateNote(window.location.hash.slice(1), false);
    });

    activateNote(window.location.hash.slice(1), false);
    updateShellLanguage();
  </script>
</body>
</html>
