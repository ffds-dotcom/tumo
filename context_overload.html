<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Game</title>
  <link rel="icon" href="data:," />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1f2418;
      --paper: #fff7dc;
      --paper-dark: #edd78c;
      --green: #3f7e45;
      --green-dark: #245c3b;
      --blue: #6eb6d9;
      --red: #c84637;
      --gold: #e8ac3e;
      --soil: #7b4f2f;
      --shadow: rgba(33, 38, 25, 0.25);
      --line: rgba(40, 55, 34, 0.18);
      --cell-size: 2px;
      --bottom-card-bar-height: 256px;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      background: #4db8e6;
    }

    button,
    canvas {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    button {
      border: 0;
      color: inherit;
    }

    .language-flags {
      display: flex;
      gap: 6px;
      width: max-content;
      padding: 5px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .language-flags button {
      width: 36px;
      height: 32px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .language-flags button:hover,
    .language-flags button.active {
      background: rgba(230, 244, 241, 0.96);
      border-color: #9dd8cf;
    }

    .app {
      height: 100vh;
      min-height: 0;
      position: relative;
      isolation: isolate;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 0;
      overflow: hidden;
      padding: 0;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0 0 var(--bottom-card-bar-height) 0;
      z-index: 0;
      background: url("assets/context_game.jpg") center center / cover no-repeat;
      pointer-events: none;
    }

    .app::after {
      display: none;
    }

    .stage-hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 30;
      color: #26381d;
      font-size: 34px;
      font-weight: 950;
      line-height: 1;
      text-shadow: 3px 3px 0 #f0c34d;
      pointer-events: none;
    }

    .primary-button,
    .action-button {
      min-height: 44px;
      padding: 0 18px;
      border: 3px solid #26381d;
      background: var(--gold);
      box-shadow: 0 5px 0 #8d6426;
      color: #211b12;
      font-size: 13px;
      font-weight: 950;
      text-transform: uppercase;
      cursor: pointer;
    }

    .primary-button:hover,
    .action-button:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    .primary-button:active,
    .action-button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #8d6426;
    }

    .primary-button:disabled,
    .action-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.4);
      transform: none;
    }

    .game-shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(420px, 1fr);
      align-items: stretch;
      gap: 0;
      max-width: none;
      width: 100%;
      height: 100%;
      min-height: 0;
      margin: 0;
    }

    .panel,
    .board-panel {
      border: 3px solid #26381d;
      background: rgba(255, 247, 220, 0.94);
      box-shadow: 0 8px 0 rgba(31, 36, 24, 0.18);
    }

    .panel {
      padding: 10px;
    }

    .stage-strip {
      display: grid;
      grid-template-columns: minmax(150px, 190px) minmax(280px, 1fr) minmax(220px, 290px);
      gap: 10px;
      margin-bottom: 10px;
    }

    .timer-panel {
      position: relative;
      overflow: hidden;
      min-height: 98px;
      display: grid;
      place-items: center;
      border: 3px solid #26381d;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.13) 0 2px, transparent 2px 10px),
        #d84938;
      color: #fff7dc;
      text-align: center;
      box-shadow: inset -8px -8px 0 rgba(76, 34, 25, 0.28);
    }

    .timer-number {
      font-size: clamp(36px, 5vw, 58px);
      font-weight: 950;
      line-height: 0.82;
      text-shadow: 5px 5px 0 rgba(59, 25, 22, 0.45);
    }

    .phase-label {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .timebar {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      height: 12px;
      border: 2px solid rgba(31, 36, 24, 0.55);
      background: rgba(255, 247, 220, 0.32);
    }

    .timebar-fill {
      width: 100%;
      height: 100%;
      background: #fff7dc;
      transform-origin: left center;
      transition: transform 0.1s linear;
    }

    .deck-head,
    .check-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .pill {
      min-width: 36px;
      padding: 4px 7px;
      border: 2px solid #26381d;
      background: #89c76c;
      text-align: center;
    }

    .card-list {
      display: flex;
      gap: 8px;
      max-height: 86px;
      overflow: auto;
      padding: 2px 3px 6px 0;
    }

    .card {
      position: relative;
      flex: 0 0 min(230px, 72vw);
      min-height: 62px;
      padding: 10px 10px 10px 44px;
      border: 3px solid #26381d;
      background:
        linear-gradient(90deg, rgba(38, 56, 29, 0.08) 0 8px, transparent 8px),
        #fff8de;
      box-shadow: 4px 4px 0 rgba(112, 79, 42, 0.22);
      font-size: 12px;
      font-weight: 850;
      line-height: 1.25;
    }

    .card::before {
      display: none;
    }

    .card.hidden {
      min-height: 62px;
      background:
        linear-gradient(90deg, transparent 0 12px, rgba(255, 247, 220, 0.25) 12px 16px, transparent 16px 28px),
        linear-gradient(0deg, transparent 0 12px, rgba(255, 247, 220, 0.18) 12px 16px, transparent 16px 28px),
        #2b5e42;
      color: transparent;
      overflow: hidden;
    }

    .card.hidden::after {
      content: "?";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%);
      color: #e9b646;
      font-size: 46px;
      font-weight: 950;
      line-height: 1;
      text-shadow: 3px 3px 0 rgba(38, 56, 29, 0.62);
    }

    .card-overlay {
      position: fixed;
      inset: 0;
      z-index: 24;
      display: none;
      padding: 0;
      background: transparent;
      pointer-events: none;
      overflow: hidden;
    }

    .card-overlay.show {
      display: block;
      animation: overlay-fade-in 160ms ease-out both;
    }

    .card-table {
      position: absolute;
      inset: 0;
      width: 100%;
      max-height: none;
      display: block;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      pointer-events: none;
    }

    .reveal-drawing {
      position: absolute;
      inset: 0;
      display: none;
      width: 100%;
      height: 100%;
      padding: 16px 18px 30vh;
      object-fit: contain;
      background: transparent;
      pointer-events: none;
    }

    .card-overlay.reveal .reveal-drawing {
      display: block;
      padding-bottom: calc(var(--bottom-card-bar-height) + 36px);
    }

    .bottom-card-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 32;
      height: var(--bottom-card-bar-height);
      padding: 10px 12px 12px;
      border-top: 4px solid #26381d;
      background: rgba(255, 247, 220, 0.98);
      box-shadow: 0 -10px 0 rgba(38, 56, 29, 0.13);
      overflow: visible;
      pointer-events: auto;
    }

    .bottom-card-list {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 12px;
      overflow-x: auto;
      overflow-y: visible;
      padding: 29px 2px 10px 0;
      scroll-snap-type: x proximity;
    }

    .bottom-card-bar[data-phase="draw"] .bottom-card-list {
      display: none;
    }

    .bottom-card-tools {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      pointer-events: auto;
    }

    .bottom-card-bar[data-phase="draw"] .bottom-card-tools {
      display: flex;
    }

    .bottom-card-list.is-many {
      gap: 11px;
    }

    .bottom-card-list.is-packed {
      gap: 10px;
    }

    .bottom-card-list.is-overflowing {
      justify-content: flex-start;
    }

    .bottom-card-bar .instruction-card {
      flex: 0 0 142px;
      width: 142px;
      min-height: 0;
      height: 185px;
      scroll-snap-align: start;
      display: grid;
      align-content: start;
      padding: 10px 12px 12px;
      border-width: 3px;
      box-shadow:
        7px 7px 0 rgba(76, 52, 28, 0.26),
        inset -7px -7px 0 rgba(112, 79, 42, 0.1);
      font-size: 15px;
      line-height: 1.18;
      transform: none;
      animation: bottom-card-flip 260ms ease-out both;
    }

    .bottom-card-bar[data-phase="preview"] .bottom-card {
      transform-origin: center 86%;
      animation: bottom-card-sway 1s ease-in-out infinite;
    }

    .bottom-card-bar[data-phase="preview"] .bottom-card:nth-child(even) {
      animation-delay: -0.5s;
    }

    .bottom-card-bar[data-phase="preview"] .bottom-card:nth-child(3n) {
      animation-delay: -0.25s;
    }

    .bottom-card-bar .bottom-card-list.is-many .instruction-card {
      flex-basis: 127px;
      width: 127px;
      height: 178px;
      padding: 10px 11px 11px;
      font-size: 14px;
    }

    .bottom-card-bar .bottom-card-list.is-packed .instruction-card {
      flex-basis: 110px;
      width: 110px;
      height: 166px;
      padding: 9px 9px 10px;
      font-size: 12px;
      line-height: 1.12;
    }

    .bottom-card-bar .instruction-card::before {
      display: none;
    }

    .bottom-card-bar .bottom-card-list.is-packed .instruction-card::before {
      display: none;
    }

    .bottom-card-bar .instruction-card.has-questionnaire {
      padding-top: 55px;
    }

    .bottom-card-bar .bottom-card-list.is-packed .instruction-card.has-questionnaire {
      padding-top: 47px;
    }

    .bottom-card-bar .card-question-controls {
      top: 10px;
      left: 8px;
      right: 8px;
      gap: 6px;
    }

    .bottom-card-bar .bottom-card-list.is-packed .card-question-controls {
      top: 8px;
      left: 6px;
      right: 6px;
      gap: 4px;
    }

    .bottom-card-bar .card-choice-button {
      height: 42px;
      border-width: 4px;
      font-size: 16px;
    }

    .bottom-card-bar .bottom-card-list.is-packed .card-choice-button {
      height: 34px;
      border-width: 3px;
      font-size: 13px;
    }

    .bottom-card-back {
      background:
        linear-gradient(90deg, transparent 0 10px, rgba(255, 247, 220, 0.25) 10px 13px, transparent 13px 24px),
        linear-gradient(0deg, transparent 0 10px, rgba(255, 247, 220, 0.18) 10px 13px, transparent 13px 24px),
        #2b5e42;
      color: transparent;
      overflow: hidden;
    }

    .bottom-card-back .card-prompt-text {
      color: transparent;
    }

    .bottom-card-back::after {
      content: "?";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%);
      color: #e9b646;
      font-size: 50px;
      font-weight: 950;
      line-height: 1;
      text-shadow: 3px 3px 0 rgba(38, 56, 29, 0.62);
    }

    .bottom-card-not-auditable {
      opacity: 0.76;
      filter: grayscale(0.25);
    }

    .overlay-status {
      position: absolute;
      top: 16px;
      left: 0;
      right: 0;
      box-sizing: border-box;
      width: auto;
      display: grid;
      grid-template-columns: minmax(0, 860px);
      justify-content: center;
      align-items: start;
      gap: 12px;
      padding: 0 16px;
      pointer-events: none;
    }

    .overlay-clock {
      min-width: 118px;
      padding: 10px 12px;
      border: 3px solid #26381d;
      text-align: center;
    }

    .overlay-clock {
      --clock-tilt: -2.5deg;
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 3;
      min-height: 96px;
      display: grid;
      place-items: center;
      background: #d84938;
      color: #fff7dc;
      box-shadow: inset -6px -6px 0 rgba(76, 34, 25, 0.28);
      transform: rotate(var(--clock-tilt));
      transform-origin: 50% 54%;
      pointer-events: auto;
    }

    .overlay-clock.timer-shake {
      animation: timer-shake 260ms ease-out both;
    }

    .overlay-prompt {
      display: none;
    }

    .overlay-timer {
      font-size: clamp(34px, 6vw, 62px);
      font-weight: 950;
      line-height: 0.85;
      text-shadow: 4px 4px 0 rgba(59, 25, 22, 0.45);
    }

    .overlay-phase {
      margin-top: 5px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .overlay-prompt-label {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .overlay-prompt-instruction,
    .overlay-prompt-detail {
      display: block;
      color: #5b683b;
      font-size: clamp(13px, 1.8vw, 20px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .overlay-prompt-title {
      display: block;
      max-width: 100%;
      padding: 6px 18px 7px;
      border: 3px solid #26381d;
      background: #d84938;
      color: #fff7dc;
      box-shadow: inset -5px -5px 0 rgba(76, 34, 25, 0.3);
      overflow-wrap: break-word;
      font-size: clamp(30px, 5vw, 58px);
      font-weight: 950;
      line-height: 0.98;
      text-shadow: 3px 3px 0 rgba(59, 25, 22, 0.4);
    }

    .overlay-prompt-detail {
      color: #26381d;
      font-size: clamp(12px, 1.45vw, 16px);
    }

    .overlay-timebar {
      display: none;
      height: 16px;
      border: 3px solid #26381d;
      background: rgba(216, 73, 56, 0.22);
      animation: bar-pop-in 260ms 120ms ease-out both;
      overflow: hidden;
    }

    .overlay-timebar-fill {
      width: 100%;
      height: 100%;
      background: #d84938;
      transform-origin: left center;
      transition: transform 0.1s linear;
    }

    .preview-stack {
      position: absolute;
      inset: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 18px;
      overflow: auto;
      padding: 190px 24px 92px;
      pointer-events: none;
    }

    .preview-card-list {
      width: max-content;
      max-width: min(100%, 1280px);
      min-height: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      align-content: flex-start;
      gap: 14px;
      flex-wrap: wrap;
      overflow: visible;
      padding: 0;
      pointer-events: none;
    }

    .instruction-card {
      --card-delay: 0ms;
      --card-tilt: 0deg;
      position: relative;
      flex: 0 1 228px;
      min-height: 288px;
      display: grid;
      align-content: start;
      padding: 16px 24px 22px;
      border: 5px solid #26381d;
      background:
        linear-gradient(90deg, rgba(38, 56, 29, 0.08) 0 8px, transparent 8px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.65), transparent 44%),
        #fff8de;
      box-shadow:
        10px 10px 0 rgba(76, 52, 28, 0.28),
        inset -10px -10px 0 rgba(112, 79, 42, 0.11);
      color: #26381d;
      font-size: 25px;
      font-weight: 950;
      line-height: 1.24;
      text-align: center;
      transform: translateY(0) scale(1) rotate(var(--card-tilt));
      transform-origin: center 86%;
      animation: card-pop-in 430ms cubic-bezier(0.15, 0.9, 0.2, 1.2) both;
      animation-delay: var(--card-delay);
      will-change: transform, opacity;
      pointer-events: auto;
    }

    .instruction-card::before {
      display: none;
    }

    .instruction-card.has-questionnaire {
      padding-top: 91px;
    }

    .card-prompt-text {
      display: block;
      margin-top: 0;
    }

    .card-pin-badge {
      display: inline-block;
      width: max-content;
      max-width: 100%;
      justify-self: center;
      margin-bottom: 8px;
      padding: 3px 7px;
      border: 2px solid #26381d;
      background: #e9b646;
      color: #26381d;
      font-size: 10px;
      font-weight: 950;
      line-height: 1;
      text-transform: uppercase;
    }

    .card-pin-badge {
      display: none;
      position: absolute;
      right: 12px;
      top: 14px;
      margin: 0;
      background: #7dbde8;
    }

    .instruction-card.context-faded {
      opacity: 0.72;
      filter: grayscale(0.4);
    }

    .instruction-card.context-faded .card-prompt-text {
      color: #5e6a5a;
    }

    .instruction-card.is-pinnable {
      cursor: pointer;
    }

    .instruction-card.card-pinned {
      border-color: #1d6f87;
      box-shadow:
        8px 8px 0 rgba(29, 111, 135, 0.28),
        inset -8px -8px 0 rgba(29, 111, 135, 0.12);
    }

    .instruction-card.card-pinned .card-pin-badge {
      display: inline-block;
    }

    .card-question-controls {
      position: absolute;
      top: 14px;
      left: 70px;
      right: 14px;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .card-choice-button {
      height: 36px;
      border: 4px solid #26381d;
      color: #1f2418;
      font: inherit;
      font-size: 12px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: inset -3px -3px 0 rgba(38, 56, 29, 0.16);
      transform-origin: center;
      transition: background 120ms ease, box-shadow 120ms ease, filter 120ms ease, transform 120ms ease;
    }

    .card-choice-button:hover {
      filter: brightness(1.08);
      transform: translateY(-2px) scale(1.04);
      box-shadow:
        0 5px 0 rgba(38, 56, 29, 0.26),
        inset -3px -3px 0 rgba(38, 56, 29, 0.16);
      outline: 3px solid #fff7dc;
      outline-offset: -6px;
    }

    .card-choice-button:active {
      transform: translateY(1px) scale(1.01);
      box-shadow:
        0 2px 0 rgba(38, 56, 29, 0.24),
        inset -3px -3px 0 rgba(38, 56, 29, 0.16);
    }

    .card-choice-button:focus-visible {
      outline: 3px solid #f0d96b;
      outline-offset: 2px;
    }

    .card-choice-included {
      background: #8ccd65;
    }

    .card-choice-included:hover {
      background: #a8e17c;
    }

    .card-choice-dropped {
      background: #d87968;
    }

    .card-choice-dropped:hover {
      background: #ef917d;
    }

    .card-choice-button.is-selected {
      background: #5fa845;
      color: #fffdf1;
    }

    .card-choice-button.is-selected:hover {
      background: #6fc352;
    }

    .card-choice-dropped.is-selected {
      background: #c84637;
    }

    .card-choice-dropped.is-selected:hover {
      background: #df5848;
    }

    .instruction-card:nth-child(3n + 1) {
      --card-tilt: -2deg;
    }

    .instruction-card:nth-child(3n + 2) {
      --card-tilt: 1.4deg;
    }

    .instruction-card:nth-child(3n) {
      --card-tilt: 2.2deg;
    }

    .overlay-actions {
      display: none;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 10px;
    }

    .overlay-go {
      z-index: 2;
      min-width: 98px;
      pointer-events: auto;
      transform-origin: center;
      animation: go-wobble 1.15s ease-in-out 2;
    }

    .overlay-next-turn {
      z-index: 2;
      min-width: 156px;
      pointer-events: auto;
    }

    .phase-action-button {
      position: fixed;
      left: 50%;
      bottom: clamp(96px, calc(var(--bottom-card-bar-height) + 22px), calc(100vh - 112px));
      z-index: 42;
      min-width: 312px;
      min-height: 88px;
      padding: 0 36px;
      border-width: 6px;
      box-shadow: 0 10px 0 #8d6426;
      font-size: 26px;
      line-height: 1;
      white-space: nowrap;
      translate: -50% 0;
      pointer-events: auto;
    }

    .phase-action-button:hover {
      transform: translateY(-2px);
    }

    .phase-action-button:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #8d6426;
    }

    .phase-action-button:disabled {
      display: none;
    }

    .draw-action-bar {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 46;
      display: flex;

      box-shadow:
        8px 8px 0 rgba(47, 111, 63, 0.28),

        linear-gradient(180deg, rgba(255, 255, 255, 0.7), transparent 44%),

    .card-overlay.reveal .instruction-card.card-dropped {

    .click-me-state {
      transform-origin: center;
      animation: click-me-control 780ms ease-in-out both;
    }

    .instruction-card.click-me-state {

    }

    .instruction-card:hover,
    .bottom-card-bar[data-phase="preview"] .bottom-card:hover {
      animation: card-hover-wiggle 520ms ease-in-out infinite;
      transform-origin: center 86%;

    @keyframes overlay-fade-in {
      from {
        background: transparent;
      }
      to {
        background: transparent;
      }
    }

    @keyframes table-pop-in {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes panel-pop-in {
      from {
        opacity: 0;
        transform: translateY(-10px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes timer-shake {
      0%,
      100% {
        transform: translate(0, 0) rotate(var(--clock-tilt));
      }
      18% {
        transform: translate(-3px, 1px) rotate(calc(var(--clock-tilt) - 3deg));
      }
      38% {
        transform: translate(3px, -1px) rotate(calc(var(--clock-tilt) + 2deg));
      }
      58% {
        transform: translate(-2px, 0) rotate(calc(var(--clock-tilt) - 2deg));
      }
      78% {
        transform: translate(2px, 1px) rotate(calc(var(--clock-tilt) + 1deg));
      }
    }

    @keyframes bar-pop-in {
      from {
        opacity: 0;
        transform: scaleX(0.78);
      }
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes card-pop-in {
      0% {
        opacity: 0;
        transform: translateY(64px) scale(0.68) rotate(calc(var(--card-tilt) - 10deg));
      }
      70% {
        opacity: 1;
        transform: translateY(-10px) scale(1.05) rotate(calc(var(--card-tilt) + 2deg));
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(var(--card-tilt));
      }
    }

    @keyframes bottom-card-flip {
      from {
        opacity: 0.25;
        transform: rotateY(82deg) translateY(4px);
      }
      to {
        opacity: 1;
        transform: rotateY(0deg) translateY(0);
      }
    }

    @keyframes bottom-card-sway {
      0%,
      100% {
        transform: rotate(-2deg);
      }
      50% {
        transform: rotate(2deg);
      }
    }

    @keyframes go-wobble {
      0%,
      100% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      20% {
        transform: translateY(-2px) rotate(-2deg) scale(1.03);
      }
      40% {
        transform: translateY(1px) rotate(2deg) scale(1.03);
      }
      60% {
        transform: translateY(-1px) rotate(-1deg) scale(1.02);
      }
      80% {
        transform: translateY(0) rotate(1deg) scale(1);
      }
    }

    @keyframes click-me-control {
      0%,
      100% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      18% {
        transform: translateY(-2px) rotate(-2deg) scale(1.03);
      }
      38% {
        transform: translateY(1px) rotate(2.4deg) scale(1.03);
      }
      58% {
        transform: translateY(-1px) rotate(-1.4deg) scale(1.02);
      }
      78% {
        transform: translateY(0) rotate(1deg) scale(1);
      }
    }

    @keyframes click-me-card {
      0%,
      100% {
        transform: translateY(0) scale(1) rotate(var(--card-tilt));
      }
      18% {
        transform: translateY(-3px) scale(1.02) rotate(calc(var(--card-tilt) - 3deg));
      }
      38% {
        transform: translateY(1px) scale(1.02) rotate(calc(var(--card-tilt) + 3deg));
      }
      58% {
        transform: translateY(-1px) scale(1.01) rotate(calc(var(--card-tilt) - 1.8deg));
      }
      78% {
        transform: translateY(0) scale(1) rotate(calc(var(--card-tilt) + 1deg));
      }
    }

    @keyframes card-hover-wiggle {
      0%,
      100% {
        transform: translateY(-4px) scale(1.035) rotate(var(--card-tilt));
      }
      25% {
        transform: translateY(-5px) scale(1.04) rotate(calc(var(--card-tilt) - 3deg));
      }
      50% {
        transform: translateY(-3px) scale(1.04) rotate(calc(var(--card-tilt) + 3deg));
      }
      75% {
        transform: translateY(-5px) scale(1.035) rotate(calc(var(--card-tilt) - 1.5deg));
      }
    }

    @keyframes action-pop-in {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .overlay-timebar,
      .instruction-card,

    function getAudioContext() {
      if (audioContext) {
        return audioContext;
      }

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return null;
      }

      audioContext = new AudioContextClass();
      masterGain = audioContext.createGain();
      masterGain.gain.value = 0.45;
      masterGain.connect(audioContext.destination);
      return audioContext;
    }

    function resumeAudio() {
      const context = getAudioContext();
      if (context && context.state === "suspended") {

      }
    }

    function playPopSound({ frequency = 720, type = "triangle", volume = 0.08, duration = 0.07 } = {}) {
      const context = getAudioContext();
      if (!context || context.state !== "running") {
        return;
      }

      const now = context.currentTime;
      const oscillator = context.createOscillator();
      const gain = context.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, now);
      oscillator.frequency.exponentialRampToValueAtTime(Math.max(80, frequency * 0.58), now + duration);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      oscillator.connect(gain);
      gain.connect(masterGain);
      oscillator.start(now);
      oscillator.stop(now + duration + 0.01);
    }

    function createScratchBuffer(context) {
      const duration = 0.16;
      const frameCount = Math.floor(context.sampleRate * duration);
      const buffer = context.createBuffer(1, frameCount, context.sampleRate);
      const data = buffer.getChannelData(0);

      for (let index = 0; index < frameCount; index += 1) {
        const fade = 1 - index / frameCount;
        data[index] = (Math.random() * 2 - 1) * fade;
      }

      return buffer;
    }

    function currentCardTarget() {
      const { cardDelta = 0 } = getRoundConfig();
      return Math.min(Math.max(STARTING_CARD_COUNT, STARTING_CARD_COUNT + stage - 1 + cardDelta), cardKeys.length);
    }

    function shuffle(list) {
      const result = list.slice();
      for (let i = result.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function resetDrawPile() {
      drawPile = shuffle(cardKeys);
      drawnCardKeys = new Set();
    }

    function getCardDefinition(cardKey) {
      return cardDefinitionByKey.get(cardKey) || { key: cardKey, type: "base", minStage: 1, weight: 1, order: "body" };
    }

    function canDrawFromPile(cardKey, selectedSet) {
      const card = getCardDefinition(cardKey);
      if (stage < (card.minStage || 1)) {
        return false;
      }

      const parents = card.parents || [];
      return parents.every((requiredKey) => drawnCardKeys.has(requiredKey) || selectedSet.has(requiredKey));
    }

    function getCardSelectionWeight(cardKey, selectedSet) {
      const card = getCardDefinition(cardKey);
      let weight = card.weight || 1;

      if (card.type === "chain") {
        const parents = card.parents || [];
        if (parents.some((parentKey) => selectedSet.has(parentKey))) {
          weight *= 2.1;
        } else if (parents.some((parentKey) => drawnCardKeys.has(parentKey))) {
          weight *= 1.45;
        }
      }

      return weight;
    }

    function takeNextCardFromPile(selectedSet) {
      const candidates = drawPile
        .map((cardKey, index) => ({
          cardKey,
          index,
          weight: canDrawFromPile(cardKey, selectedSet) ? getCardSelectionWeight(cardKey, selectedSet) : 0
        }))
        .filter(({ weight }) => weight > 0);

      if (!candidates.length) {
        return "";
      }

      const totalWeight = candidates.reduce((sum, { weight }) => sum + weight, 0);
      let roll = Math.random() * totalWeight;
      const picked = candidates.find(({ weight }) => {
        roll -= weight;
        return roll <= 0;
      }) || candidates[candidates.length - 1];
      const cardIndex = picked.index;
      const [cardKey] = drawPile.splice(cardIndex, 1);
      drawnCardKeys.add(cardKey);
      selectedSet.add(cardKey);
      return cardKey;
    }

    function moveCard(arranged, fromIndex, toIndex) {
      if (fromIndex < 0 || fromIndex === toIndex) {
        return;
      }
      const [cardKey] = arranged.splice(fromIndex, 1);
      arranged.splice(Math.max(0, Math.min(toIndex, arranged.length)), 0, cardKey);
    }

    function moveCardKey(arranged, cardKey, toIndex) {
      moveCard(arranged, arranged.indexOf(cardKey), toIndex);
    }

    function moveCardKeyToEnd(arranged, cardKey) {
      const fromIndex = arranged.indexOf(cardKey);
      if (fromIndex < 0) {
        return;
      }
      const [movedCardKey] = arranged.splice(fromIndex, 1);
      arranged.push(movedCardKey);
    }

    function orderChainsAfterParents(cards) {
      const arranged = cards.slice();
      for (let pass = 0; pass < arranged.length; pass += 1) {
        let changed = false;
        arranged.slice().forEach((cardKey) => {
          const parents = getCardDefinition(cardKey).parents || [];
          const parentIndexes = parents
            .map((parentKey) => arranged.indexOf(parentKey))
            .filter((index) => index >= 0);

          if (!parentIndexes.length) {
            return;
          }

          const childIndex = arranged.indexOf(cardKey);
          const lastParentIndex = Math.max(...parentIndexes);
          if (childIndex >= 0 && childIndex < lastParentIndex) {
            const [movedCardKey] = arranged.splice(childIndex, 1);
            const updatedParentIndex = Math.max(...parents
              .map((parentKey) => arranged.indexOf(parentKey))
              .filter((index) => index >= 0));
            arranged.splice(updatedParentIndex + 1, 0, movedCardKey);
            changed = true;
          }
        });

        if (!changed) {
          break;
        }
      }
      return arranged;
    }

    function arrangePromptCards(cards) {
      let arranged = orderChainsAfterParents(shuffle(cards));
      const frontCards = arranged.filter((cardKey) => getCardDefinition(cardKey).order === "front");
      frontCards.forEach((cardKey) => {
        if (Math.random() < 0.85) {
          moveCardKey(arranged, cardKey, Math.floor(Math.random() * Math.min(3, arranged.length)));
        }
      });

      arranged = orderChainsAfterParents(arranged);

      arranged
        .filter((cardKey) => getCardDefinition(cardKey).order === "end")
        .forEach((cardKey) => moveCardKeyToEnd(arranged, cardKey));

      return arranged;
    }

    function drawStageCards() {
      const targetCount = Math.min(currentCardTarget(), drawPile.length);
      const selected = [];
      const selectedSet = new Set();

      while (selected.length < targetCount) {
        const nextCard = takeNextCardFromPile(selectedSet);
        if (!nextCard) {
          break;
        }
        selected.push(nextCard);
      }

      stageCards = arrangePromptCards(selected);
    }

    function createCardElement(cardKey, index, className, showText = true, showQuestionnaire = false, options = {}) {
      const { faded = false, pinnable = false, displayIndex = index } = options;
      const card = document.createElement("article");
      card.className = className;
      card.dataset.index = displayIndex + 1;
      card.dataset.cardIndex = index;
      if (faded) {
        card.classList.add("context-faded");
      }
      if (showQuestionnaire) {
        card.classList.add("has-questionnaire");
      }
      if (pinnable) {
        card.classList.add("is-pinnable");
        card.setAttribute("role", "button");
        card.setAttribute("tabindex", "0");
        card.addEventListener("click", () => togglePinnedCard(index));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            togglePinnedCard(index);
          }
        });
      }

      const pinBadge = document.createElement("span");
      pinBadge.className = "card-pin-badge";
      pinBadge.textContent = translate("pinnedBadge");

      const promptText = document.createElement("span");
      promptText.className = "card-prompt-text";
      promptText.textContent = showText ? translateCard(cardKey) : translate(faded ? "fadedContext" : "hiddenCard");

      if (showQuestionnaire) {
        const controls = document.createElement("div");
        controls.className = "card-question-controls";

        [
          { mark: "included", labelKey: "includedButton", className: "card-choice-included" },
          { mark: "dropped", labelKey: "droppedButton", className: "card-choice-dropped" }
        ].forEach(({ mark, labelKey, className }) => {
          const button = document.createElement("button");
          button.className = `card-choice-button ${className}`;
          button.type = "button";
          button.dataset.audit = mark;
          button.textContent = translate(labelKey);
          button.setAttribute("aria-pressed", "false");
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            setAuditMark(index, mark);
          });
          controls.appendChild(button);
        });

        card.append(controls, pinBadge, promptText);
      } else {
        card.append(pinBadge, promptText);
      }

      if (className.includes("instruction-card")) {
        card.style.setProperty("--card-delay", `${Math.min(displayIndex * 70, 700)}ms`);
        syncRevealCardState(card, index);
        syncPinnedCardState(card, index);
      }
      return card;
    }

    function syncRevealCardState(card, index) {
      const mark = cardAuditMarks.get(index);
      card.classList.toggle("card-correct", mark === "included");
      card.classList.toggle("card-dropped", mark === "dropped");
      delete card.dataset.auditLabel;

      card.querySelectorAll(".card-choice-button").forEach((button) => {
        const isSelected = button.dataset.audit === mark;
        button.classList.toggle("is-selected", isSelected);
        button.setAttribute("aria-pressed", isSelected ? "true" : "false");
      });
    }

    function syncPinnedCardState(card, index) {
      const isPinned = pinnedCardIndexes.has(index);
      card.classList.toggle("card-pinned", isPinned);
      if (card.classList.contains("is-pinnable")) {
        card.setAttribute("aria-pressed", isPinned ? "true" : "false");
      }
    }

    function syncRevealCardStates() {
      document.querySelectorAll(".instruction-card").forEach((card) => {
        const index = Number(card.dataset.cardIndex);
        syncRevealCardState(card, index);
        syncPinnedCardState(card, index);
      });
      updateRevealCompletion();
      renderAuditSummary();
    }

    function updateRevealCompletion() {
      const auditTargetCount = getAuditableCardCount();
      const allAudited = phase === "reveal" && cardAuditMarks.size === auditTargetCount;
      const needsRetry = allAudited && hasAuditProblem();
      overlayNextTurnButton.hidden = !allAudited;
      overlayNextTurnButton.classList.toggle("needs-retry", needsRetry);
      overlayNextTurnButton.textContent = translate(needsRetry ? "retryRunButton" : "nextTurnButton");
      scheduleClickMeStatePulse(allAudited ? 220 : CLICK_ME_DELAY_MS);
    }

    function setAuditMark(index, mark) {
      if (phase !== "reveal") {
        return;
      }
      if (!isAuditableCard(stageCards[index])) {
        return;
      }
      if (cardAuditMarks.get(index) === mark) {
        return;
      }

      clearTimeout(revealAdvanceTimer);
      cardAuditMarks.set(index, mark);
      if (mark === "included") {
        playCoinSound();
      } else {
        playNegativeSound();
      }
      syncRevealCardStates();
    }

    function togglePinnedCard(index) {
      const limit = getRoundConfig().summaryLimit || 0;
      if (phase !== "preview" || !limit || isContextFaded(index)) {
        return;
      }
      if (pinnedCardIndexes.has(index)) {
        pinnedCardIndexes.delete(index);
      } else if (pinnedCardIndexes.size < limit) {
        pinnedCardIndexes.add(index);
        playCoinSound();
      } else {
        playNegativeSound();
      }
      renderOverlayCards(false);
      renderBottomCards("front");
      renderContextNotes();
    }

    function renderAuditSummary() {
      auditSummary.hidden = true;
      auditSummary.replaceChildren();
    }

    function renderContextNotes() {
      if (phase !== "draw" || !pinnedCardIndexes.size) {
        contextNotes.hidden = true;
        contextNotes.replaceChildren();
        return;
      }

      const title = document.createElement("strong");
      const list = document.createElement("ol");
      title.textContent = translate("contextNotesTitle");

      [...pinnedCardIndexes].sort((a, b) => a - b).forEach((index) => {
        const item = document.createElement("li");
        item.textContent = translateCard(stageCards[index]);
        list.appendChild(item);
      });

      contextNotes.replaceChildren(title, list);
      contextNotes.hidden = false;
    }

    function renderCards(showText) {
      cardsVisible = showText;
      visibleCount.textContent = showText ? stageCards.length : 0;
      cardList.innerHTML = "";
      stageCards.forEach((cardKey, index) => {
        cardList.appendChild(createCardElement(cardKey, index, "card" + (showText ? "" : " hidden"), showText));
      });
    }

    function getBottomCardMode() {
      if (phase === "reveal") {
        return "audit";
      }
      if (phase === "draw") {
        return "tools";
      }
      return "front";
    }

    function setBottomCardDensity() {
      bottomCardList.classList.toggle("is-many", stageCards.length > 8);
      bottomCardList.classList.toggle("is-packed", stageCards.length > 14);
    }

    function updateBottomCardAlignment() {
      requestAnimationFrame(() => {
        const isOverflowing = bottomCardList.scrollWidth > bottomCardList.clientWidth + 1;
        bottomCardList.classList.toggle("is-overflowing", isOverflowing);
      });
    }

    function hideBottomCards() {
      bottomCardBar.hidden = true;
      delete bottomCardBar.dataset.phase;
      delete bottomCardBar.dataset.mode;
      bottomCardList.replaceChildren();
      document.querySelector(".app").classList.remove("has-bottom-cards");
    }

    function renderBottomCards(mode = getBottomCardMode()) {
      const shouldShow = phase === "idle" || (stageCards.length && (phase === "preview" || phase === "draw" || phase === "reveal"));
      if (!shouldShow) {
        hideBottomCards();
        return;
      }

      bottomCardBar.hidden = false;
      bottomCardBar.dataset.mode = stageCards.length ? mode : "empty";
      bottomCardBar.dataset.phase = phase;
      document.querySelector(".app").classList.add("has-bottom-cards");
      bottomCardList.replaceChildren();
      setBottomCardDensity();

      if (!stageCards.length || phase === "draw") {
        updateBottomCardAlignment();
        return;
      }

      stageCards.forEach((cardKey, index) => {
        const isAuditMode = mode === "audit";
        const auditable = isAuditableCard(cardKey);
        const showQuestionnaire = isAuditMode && auditable;
        const faded = mode === "front" && isContextFaded(index);
        const pinnable = mode === "front" && phase === "preview" && canPinContext() && !faded;
        const showCardText = mode !== "back" && !faded;
        const card = createCardElement(cardKey, index, "instruction-card bottom-card", showCardText, showQuestionnaire, { faded, pinnable });

        card.classList.toggle("bottom-card-back", mode === "back");
        card.classList.toggle("bottom-card-audit", isAuditMode);
        card.classList.toggle("bottom-card-not-auditable", isAuditMode && !auditable);
        bottomCardList.appendChild(card);
      });
      updateBottomCardAlignment();
    }

    function renderOverlayCards(showQuestionnaire = phase === "reveal") {
      previewCardList.replaceChildren();
      resetOverlayScroll();
    }

    function openModal(titleKey, copyKey, buttonKey, params = {}) {
      modalContent = { titleKey, copyKey, buttonKey, params };
      applyModalContent();
      overlay.classList.add("show");
      updateMeters();
      scheduleClickMeStatePulse();
    }

    function closeModal() {
      overlay.classList.remove("show");
    }

    function startRun() {
      resumeAudio();
      timerToken += 1;
      clearTimeout(revealAdvanceTimer);
      best = Math.max(best, 0);
      stage = 1;
      stageCards = [];
      cardAuditMarks = new Map();
      pinnedCardIndexes = new Set();
      resetDrawPile();
      pixels = makeBlankPixels();
      renderCanvas();
      beginStage();
    }

    function beginStage() {
      cancelAnimationFrame(timerFrame);
      timerToken += 1;
      const stageTimerToken = timerToken;
      clearTimeout(revealAdvanceTimer);
      closeModal();
      cardAuditMarks = new Map();
      pinnedCardIndexes = new Set();
      drawStageCards();
      updateMeters();
      if (!stageCards.length) {
        setPhase("idle");
        openModal("modalVictoryTitle", "modalVictoryCopy", "newRunButton");
        return;
      }
      renderCards(true);
      renderOverlayCards(false);
      revealActions.hidden = true;
      updateRevealCompletion();
      renderAuditSummary();
      setCheckCopy(canPinContext() ? "checkSummarize" : "checkMemorize", { limit: getRoundConfig().summaryLimit || SUMMARY_KEEP_LIMIT });
      previewEndAt = performance.now() + currentPreviewSeconds() * 1000;
      setPhase("preview");
      scheduleCardPops(stageCards.length);
      tickTimer(stageTimerToken);
    }

    function tickTimer(activeTimerToken) {
      if (phase !== "preview" || activeTimerToken !== timerToken) {
        return;
      }

      const remaining = Math.max(0, previewEndAt - performance.now());
      const seconds = Math.ceil(remaining / 1000);
      timerNumber.textContent = String(seconds).padStart(2, "0");
      overlayTimerNumber.textContent = String(seconds).padStart(2, "0");
      shakeOverlayTimer(seconds);
      const scale = remaining / (currentPreviewSeconds() * 1000);
      timebarFill.style.transform = `scaleX(${scale})`;
      overlayTimebarFill.style.transform = `scaleX(${scale})`;

      if (remaining <= 0) {
        hideCardsForDrawing();
        return;
      }

      timerFrame = requestAnimationFrame(() => tickTimer(activeTimerToken));
    }

    function setDrawTimerDisplay(seconds) {
      drawTimerNumber.textContent = String(seconds).padStart(2, "0");
    }

    function stopDrawTimer() {
      cancelAnimationFrame(drawTimerFrame);
      drawTimerFrame = 0;
      drawTimerToken += 1;
      lastDrawTimerSecond = null;
      setDrawTimerDisplay(DRAW_SECONDS);
    }

    function startDrawTimer() {
      cancelAnimationFrame(drawTimerFrame);
      drawTimerToken += 1;
      lastDrawTimerSecond = null;
      drawEndAt = performance.now() + DRAW_SECONDS * 1000;
      tickDrawTimer(drawTimerToken);
    }

    function tickDrawTimer(activeDrawTimerToken) {
      if (phase !== "draw" || activeDrawTimerToken !== drawTimerToken) {
        return;
      }

      const remaining = Math.max(0, drawEndAt - performance.now());
      const seconds = Math.ceil(remaining / 1000);
      if (seconds !== lastDrawTimerSecond) {
        setDrawTimerDisplay(seconds);
        lastDrawTimerSecond = seconds;
      }

      if (remaining <= 0) {
        finishDrawing();
        return;
      }

      drawTimerFrame = requestAnimationFrame(() => tickDrawTimer(activeDrawTimerToken));
    }

    function hideCardsForDrawing() {
      cancelAnimationFrame(timerFrame);
      timerToken += 1;
      renderCards(false);
      setCheckCopy("checkDraw");
      setPhase("draw");
      renderContextNotes();
    }

    function skipPreview() {
      if (phase !== "preview") {
        return;
      }
      resumeAudio();
      hideCardsForDrawing();
    }

    function finishDrawing() {
      if (phase !== "draw") {
        return;
      }
      const auditTargetCount = getAuditableCardCount();
      revealDrawing.src = canvas.toDataURL("image/png");
      cardAuditMarks = new Map();
      renderCards(true);
      renderOverlayCards(true);
      revealActions.hidden = true;
      updateRevealCompletion();
      setCheckCopy("checkReveal");
      setPhase("reveal");
      renderAuditSummary();
      scheduleCardPops(auditTargetCount);
    }

    function finishAudit() {
      if (phase !== "reveal" || cardAuditMarks.size !== getAuditableCardCount()) {
        return;
      }
      if (hasAuditProblem()) {
        markMissed(getAuditSummary());
      } else {
        markCorrect();
      }
    }

    function markCorrect() {
      if (phase !== "reveal") {
        return;
      }
      clearTimeout(revealAdvanceTimer);
      best = Math.max(best, stage);
      if (!drawPile.length) {
        setPhase("idle");
        openModal("modalVictoryTitle", "modalVictoryCopy", "newRunButton");
        return;
      }
      stage += 1;
      beginStage();
    }

    function markMissed(summary = getAuditSummary()) {
      if (phase !== "reveal") {
        return;
      }
      clearTimeout(revealAdvanceTimer);
      playNegativeSound();
      setPhase("idle");
      openModal("modalGameOverTitle", "modalGameOverCopy", "newRunButton", {
        stage,
        best,
        included: summary.included || 0,
        dropped: summary.dropped || 0
      });
    }

    function renderCanvas() {
      canvas.width = GRID_COLS * CELL_SIZE;
      canvas.height = GRID_ROWS * CELL_SIZE;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let row = 0; row < GRID_ROWS; row += 1) {
        for (let col = 0; col < GRID_COLS; col += 1) {
          const color = pixels[row][col];
          if (color) {
            ctx.fillStyle = color;
            ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
          }
        }
      }

    }

    function cellFromPointer(event) {
      const rect = canvas.getBoundingClientRect();
      const col = Math.floor((event.clientX - rect.left) / rect.width * GRID_COLS);
      const row = Math.floor((event.clientY - rect.top) / rect.height * GRID_ROWS);

      return {
        col: Math.max(0, Math.min(GRID_COLS - 1, col)),
        row: Math.max(0, Math.min(GRID_ROWS - 1, row))
      };
    }

    function stampBrush(col, row, color) {
      const startCol = col - Math.floor(BRUSH_SIZE / 2) + 1;
      const startRow = row - Math.floor(BRUSH_SIZE / 2) + 1;
      let changed = false;

      for (let y = 0; y < BRUSH_SIZE; y += 1) {
        for (let x = 0; x < BRUSH_SIZE; x += 1) {
          const paintCol = startCol + x;
          const paintRow = startRow + y;
          if (paintCol < 0 || paintRow < 0 || paintCol >= GRID_COLS || paintRow >= GRID_ROWS) {
            continue;
          }
          if (pixels[paintRow][paintCol] !== color) {
            pixels[paintRow][paintCol] = color;
            changed = true;
          }
        }
      }

      return changed;
    }

    function paintCell(col, row, shouldRender = true) {
      const nextColor = activeTool === "eraser" ? null : activeColor;
      const key = `${activeTool}:${col},${row}:${nextColor}`;
      if (lastPaintCell === key) {
        return;
      }
      lastPaintCell = key;

      if (stampBrush(col, row, nextColor) && shouldRender) {
        renderCanvas();
      }
    }

    function paintLine(fromCell, toCell) {
      const deltaCol = toCell.col - fromCell.col;
      const deltaRow = toCell.row - fromCell.row;
      const steps = Math.max(Math.abs(deltaCol), Math.abs(deltaRow), 1);

      for (let step = 1; step <= steps; step += 1) {
        const col = Math.round(fromCell.col + (deltaCol * step) / steps);
        const row = Math.round(fromCell.row + (deltaRow * step) / steps);
        paintCell(col, row, false);
      }

      renderCanvas();
    }

    function fillFrom(col, row) {
      const target = pixels[row][col];
      const replacement = activeTool === "eraser" ? null : activeColor;
      if (target === replacement) {
        return;
      }

      const stack = [[col, row]];
      const seen = new Set();

      while (stack.length) {
        const [x, y] = stack.pop();
        const key = `${x},${y}`;
        if (seen.has(key)) {
          continue;
        }
        seen.add(key);
        if (x < 0 || y < 0 || x >= GRID_COLS || y >= GRID_ROWS) {
          continue;
        }
        if (pixels[y][x] !== target) {
          continue;
        }
        pixels[y][x] = replacement;
        stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
      }

      renderCanvas();
    }

    function handlePointerDown(event) {
      if (phase !== "draw") {
        return;
      }
      event.preventDefault();
      resumeAudio();
      canvas.setPointerCapture(event.pointerId);
      const { col, row } = cellFromPointer(event);
      lastPaintCell = null;

      if (activeTool === "fill") {
        fillFrom(col, row);
        return;
      }

      isDrawing = true;
      startScratchSound();
      lastPaintCell = null;
      paintCell(col, row);
      lastPaintCell = { col, row };
    }

    function handlePointerMove(event) {
      if (!isDrawing || phase !== "draw") {
        return;
      }
      event.preventDefault();
      const nextCell = cellFromPointer(event);
      paintLine(lastPaintCell || nextCell, nextCell);
      lastPaintCell = nextCell;
    }

    function stopDrawing(event) {
      if (event && canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
      isDrawing = false;
      lastPaintCell = null;
      stopScratchSound();
    }

    function setTool(tool) {
      activeTool = tool;
      document.querySelectorAll("[data-tool]").forEach((button) => {
        button.classList.toggle("active", button.dataset.tool === tool);
      });
    }

    function setColor(color) {
      activeColor = color;
      document.querySelectorAll(".swatch").forEach((button) => {
        button.classList.toggle("active", button.dataset.color === color);
      });
      if (activeTool === "eraser") {
        setTool("pencil");
      }
    }

    function buildSwatches() {
      palette.forEach((color, index) => {
        const button = document.createElement("button");
        button.className = "swatch" + (index === 0 ? " active" : "");
        button.type = "button";
        button.dataset.color = color;
        button.style.setProperty("--swatch", color);
        button.title = color;
        button.setAttribute("aria-label", translate("colorLabel", { color }));
        button.addEventListener("click", () => setColor(color));
        swatches.appendChild(button);
      });
    }

    document.querySelectorAll("[data-tool]").forEach((button) => {
      button.addEventListener("click", () => setTool(button.dataset.tool));
    });

    canvas.addEventListener("pointerdown", handlePointerDown);
    canvas.addEventListener("pointermove", handlePointerMove);
    canvas.addEventListener("pointerup", stopDrawing);
    canvas.addEventListener("pointercancel", stopDrawing);
    canvas.addEventListener("pointerleave", stopDrawing);
    doneButton.addEventListener("click", finishDrawing);
    correctButton.addEventListener("click", markCorrect);
    missedButton.addEventListener("click", markMissed);
    overlayGoButton.addEventListener("click", skipPreview);
    overlayNextTurnButton.addEventListener("click", finishAudit);
    overlayCorrectButton.addEventListener("click", markCorrect);
    overlayMissedButton.addEventListener("click", markMissed);
    if (newRunButton) {
      newRunButton.addEventListener("click", startRun);
    }
    modalButton.addEventListener("click", startRun);
    langButtons.forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.lang));
    });

    buildSwatches();
    updateMeters();
    setPhase("idle");
    setCheckCopy("checkStart");
    setLanguage("en");
    renderCanvas();
    startClickMeState();
  </script>
</body>
</html>
