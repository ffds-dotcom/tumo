<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stick Figure Platformer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; overflow: hidden; }
canvas { display: block; cursor: crosshair; touch-action: none; }
#top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: rgba(255,255,255,0.92);
    border-bottom: 1px solid #e5e5e5;
    font: 13px/1 monospace;
    color: #111;
    z-index: 10;
}
#diff-btns {
    display: flex;
    gap: 4px;
}
#diff-btns button {
    padding: 4px 9px;
    border: 1px solid #ddd;
    background: transparent;
    color: #999;
    font: 12px/1 monospace;
    cursor: pointer;
    border-radius: 3px;
}
#diff-btns button.active {
    background: #111;
    color: #fff;
    border-color: #111;
}
#hud {
    position: fixed;
    bottom: 12px;
    left: 0; right: 0;
    text-align: center;
    color: #bbb;
    font: 12px/1 monospace;
    pointer-events: none;
}
</style>
</head>
<body>
<div id="top-bar">
    <div id="diff-btns">
        <button onclick="setDifficulty('easy')">easy</button>
        <button onclick="setDifficulty('normal')" class="active">normal</button>
        <button onclick="setDifficulty('hard')">hard</button>
    </div>
    <div id="score-display">score 10000</div>
    <div id="height-meter">height 0m</div>
</div>
<canvas id="c"></canvas>
<div id="hud">← → / A D &nbsp;·&nbsp; move &nbsp;&nbsp;&nbsp; Space / W / ↑ &nbsp;·&nbsp; jump &nbsp;&nbsp;&nbsp; drag mouse &nbsp;·&nbsp; draw platform &nbsp;&nbsp;&nbsp; reach the door</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const heightMeter = document.getElementById('height-meter');
const scoreDisplay = document.getElementById('score-display');

function resize() {
    const barH = document.getElementById('top-bar').offsetHeight;
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight - barH;
    canvas.style.marginTop = barH + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); spawnPlayer(); });

// Reference dimensions for a 200m climb across two screens.
const RW = 1512, RH = 800;
const WORLD_SCREENS = 2;
const WORLD_RH = RH * WORLD_SCREENS;
const FINISH_HEIGHT_M = 200;
const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
const worldHeight = () => canvas.height * WORLD_SCREENS;
const rx = x => x / RW * canvas.width;
const ry = y => y / WORLD_RH * worldHeight();
const toRefX = x => x / canvas.width * RW;
const toRefY = y => y / worldHeight() * WORLD_RH;
const toWorldY = y => cameraY + y;

const CLIMB_COLUMNS = [
    [80,  500],
    [520, 990],
    [1010, 1450],
    [520, 990],
];
const CLIMB_START_Y = WORLD_RH - 150;
const CLIMB_END_Y   = 425;

const DIFF = {
    easy:   { stepY: 100, drawCost: 0.5 },
    normal: { stepY: 135, drawCost: 1   },
    hard:   { stepY: 190, drawCost: 2   },
};
let difficulty = 'normal';
let score = 10000;
let platData = [];

function buildPlatData() {
    const { stepY } = DIFF[difficulty];
    const count = Math.floor((CLIMB_START_Y - CLIMB_END_Y) / stepY) + 1;
    const data = [];

    for (let i = 0; i < count; i++) {
        const y = CLIMB_START_Y - i * stepY;
        const [bx1, bx2] = CLIMB_COLUMNS[i % CLIMB_COLUMNS.length];
        const span = bx2 - bx1;
        const rng = Math.random();

        if (difficulty === 'easy') {
            data.push([bx1, y, bx2]);
        } else if (difficulty === 'normal') {
            if (rng < 0.25 && span > 300) {
                const cut = bx1 + span * (0.38 + Math.random() * 0.24);
                const gap = 60 + Math.random() * 50;
                data.push([bx1, y, cut]);
                data.push([cut + gap, y, bx2]);
            } else {
                data.push([bx1, y, bx2]);
            }
        } else {
            if (rng < 0.4 && span > 300) {
                const cut = bx1 + span * (0.35 + Math.random() * 0.3);
                const gap = 110 + Math.random() * 90;
                data.push([bx1, y, cut]);
                data.push([cut + gap, y, bx2]);
            } else if (rng < 0.6) {
                const cx  = (bx1 + bx2) / 2 + (Math.random() - 0.5) * 150;
                const hw  = 90 + Math.random() * 70;
                data.push([Math.max(bx1, cx - hw), y, Math.min(bx2, cx + hw)]);
            } else {
                data.push([bx1, y, bx2]);
            }
        }
    }

    data.push([1030, 370, 1450]); // door platform
    return data;
}

function setDifficulty(d) {
    difficulty = d;
    document.querySelectorAll('#diff-btns button').forEach(b => {
        b.classList.toggle('active', b.textContent === d);
    });
    drawnPlatData.length = 0;
    spawnPlayer();
}

function updateScoreDisplay() {
    scoreDisplay.textContent = `score ${Math.max(0, score)}`;
}

const DOOR_DATA = { x: 1280, y: 245, w: 86, h: 125 };

const drawnPlatData = [];
const MIN_DRAWN_PLATFORM = 18;
let platformDraft = null;
let cameraY = 0;
let gameWon = false;
let winAge = 0;
let confetti = [];

const CONFETTI_COLORS = ['#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6','#ec4899','#f97316'];

function spawnConfetti(sx, sy) {
    for (let i = 0; i < 90; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 7;
        confetti.push({
            x: sx, y: sy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 4,
            color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
            w: 5 + Math.random() * 5,
            h: 3 + Math.random() * 3,
            rot: Math.random() * Math.PI * 2,
            rotV: (Math.random() - 0.5) * 0.25,
            life: 1,
            decay: 0.007 + Math.random() * 0.007,
        });
    }
}

const platforms = () =>
    [...platData, ...drawnPlatData]
        .map(([x1, y, x2]) => ({ x: rx(x1), y: ry(y), w: rx(x2) - rx(x1) }));

const door = () => ({
    x: rx(DOOR_DATA.x),
    y: ry(DOOR_DATA.y),
    w: rx(DOOR_DATA.w),
    h: ry(DOOR_DATA.y + DOOR_DATA.h) - ry(DOOR_DATA.y),
});

function updateHeightMeter() {
    const startY = ry(CLIMB_START_Y);
    const goalY = door().y + door().h;
    const climbSpan = Math.max(1, startY - goalY);
    const climbed = clamp(startY - p.y, 0, climbSpan);
    const meters = Math.round(climbed / climbSpan * FINISH_HEIGHT_M);

    heightMeter.textContent = `height ${meters}m`;
}

function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: clamp(e.clientX - rect.left, 0, canvas.width),
        y: clamp(e.clientY - rect.top, 0, canvas.height),
    };
}

canvas.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;

    e.preventDefault();
    const pos = getPointerPos(e);
    platformDraft = {
        pointerId: e.pointerId,
        startX: pos.x,
        endX: pos.x,
        y: toWorldY(pos.y),
    };
    canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
    if (!platformDraft || platformDraft.pointerId !== e.pointerId) return;

    e.preventDefault();
    platformDraft.endX = getPointerPos(e).x;
});

function finishPlatformDraft(e) {
    if (!platformDraft || platformDraft.pointerId !== e.pointerId) return;

    e.preventDefault();
    const pos = getPointerPos(e);
    platformDraft.endX = pos.x;
    const x1 = Math.min(platformDraft.startX, platformDraft.endX);
    const x2 = Math.max(platformDraft.startX, platformDraft.endX);

    if (x2 - x1 >= MIN_DRAWN_PLATFORM) {
        drawnPlatData.push([toRefX(x1), toRefY(platformDraft.y), toRefX(x2)]);
        score -= Math.round((x2 - x1) * DIFF[difficulty].drawCost);
        updateScoreDisplay();
    }

    if (canvas.hasPointerCapture(e.pointerId)) {
        canvas.releasePointerCapture(e.pointerId);
    }
    platformDraft = null;
}

canvas.addEventListener('pointerup', finishPlatformDraft);
canvas.addEventListener('pointercancel', finishPlatformDraft);

// Input
const keys = new Set();
window.addEventListener('keydown', e => {
    keys.add(e.code);
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
        e.preventDefault();
});
window.addEventListener('keyup', e => keys.delete(e.code));

// Physics
const GRAVITY = 0.55;
const JUMP_V  = -13;
const SPEED   = 4.5;
const HW      = 12;   // player half-width hitbox

let p;
function updateCamera() {
    cameraY = clamp(p.y - canvas.height * 0.65, 0, worldHeight() - canvas.height);
}

function spawnPlayer() {
    platData = buildPlatData();
    score = 10000;
    drawnPlatData.length = 0;
    p = { x: rx(160), y: ry(CLIMB_START_Y), vx: 0, vy: 0, grounded: false, dir: 1, frame: 0 };
    gameWon = false;
    winAge = 0;
    confetti = [];
    updateCamera();
    updateHeightMeter();
    updateScoreDisplay();
}
spawnPlayer();

function playerTouchesDoor() {
    const d = door();
    const playerTop = p.y - 62;
    return p.x + HW > d.x &&
        p.x - HW < d.x + d.w &&
        p.y > d.y &&
        playerTop < d.y + d.h;
}

function update() {
    const left  = keys.has('ArrowLeft')  || keys.has('KeyA');
    const right = keys.has('ArrowRight') || keys.has('KeyD');
    const jump  = keys.has('Space') || keys.has('ArrowUp') || keys.has('KeyW');

    if (left)       { p.vx = -SPEED; p.dir = -1; }
    else if (right) { p.vx =  SPEED; p.dir =  1; }
    else            { p.vx *= 0.8; }

    if (jump && p.grounded) { p.vy = JUMP_V; p.grounded = false; }

    p.vy += GRAVITY;
    p.x  += p.vx;
    p.y  += p.vy;

    p.x = Math.max(10, Math.min(canvas.width - 10, p.x));

    // Platform collision (top surface only)
    p.grounded = false;
    for (const pl of platforms()) {
        if (p.x + HW > pl.x && p.x - HW < pl.x + pl.w) {
            const prevY = p.y - p.vy;
            if (p.vy >= 0 && prevY <= pl.y + 1 && p.y >= pl.y) {
                p.y = pl.y;
                p.vy = 0;
                p.grounded = true;
            }
        }
    }

    // World floor
    if (p.y >= worldHeight() - 2) {
        p.y = worldHeight() - 2;
        p.vy = 0;
        p.grounded = true;
    }

    if (playerTouchesDoor() && !gameWon) {
        gameWon = true;
        const d = door();
        spawnConfetti(d.x + d.w / 2, d.y - cameraY + d.h / 2);
    }

    if (gameWon) {
        winAge++;
        for (const c of confetti) {
            c.x += c.vx;
            c.y += c.vy;
            c.vy += 0.18;
            c.rot += c.rotV;
            c.life -= c.decay;
        }
        confetti = confetti.filter(c => c.life > 0);
    }

    // Walk animation counter
    if (p.grounded && Math.abs(p.vx) > 0.4) p.frame += 0.15;

    // Respawn if fell off bottom
    if (p.y > worldHeight() + 200) spawnPlayer();

    updateCamera();
    updateHeightMeter();
}

function drawFigure(x, y, dir, frame, air) {
    ctx.save();
    ctx.strokeStyle = '#111';
    ctx.fillStyle   = '#111';
    ctx.lineWidth   = 2;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    const R  = 10; // head radius
    const BL = 22; // body length
    const AL = 15; // arm reach
    const LL = 20; // leg length

    const headY = y - LL - BL - R;  // head center
    const neckY = y - LL - BL;      // body top
    const hipY  = y - LL;           // body bottom / hip
    const armY  = neckY + 7;        // arm attach point

    // Head
    ctx.beginPath();
    ctx.arc(x, headY, R, 0, Math.PI * 2);
    ctx.stroke();

    // Eye
    ctx.beginPath();
    ctx.arc(x + dir * 4, headY - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Smile
    ctx.beginPath();
    ctx.arc(x + dir * 3, headY + 3, 4, 0.2, Math.PI - 0.2);
    ctx.stroke();

    // Body
    ctx.beginPath();
    ctx.moveTo(x, neckY);
    ctx.lineTo(x, hipY);
    ctx.stroke();

    const s = air ? 0 : Math.sin(frame);

    // Arms (opposite phase to legs)
    ctx.beginPath();
    ctx.moveTo(x, armY);
    ctx.lineTo(x - AL * 0.7 + s * 6, armY + AL * 0.75);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, armY);
    ctx.lineTo(x + AL * 0.7 - s * 6, armY + AL * 0.75);
    ctx.stroke();

    // Legs
    ctx.beginPath();
    ctx.moveTo(x, hipY);
    ctx.lineTo(x + LL * s * 0.65, y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, hipY);
    ctx.lineTo(x - LL * s * 0.65, y);
    ctx.stroke();

    ctx.restore();
}

function drawWorldGuides() {
    ctx.save();
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 1;

    for (let yRef = 0; yRef <= WORLD_RH; yRef += RH) {
        const y = ry(yRef);
        if (y < cameraY - 20 || y > cameraY + canvas.height + 20) continue;

        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }

    ctx.restore();
}

function drawDoor() {
    const d = door();

    ctx.save();
    ctx.fillStyle = gameWon ? '#dff3cf' : '#f6e5b8';
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';

    ctx.fillRect(d.x, d.y, d.w, d.h);
    ctx.strokeRect(d.x, d.y, d.w, d.h);

    ctx.beginPath();
    ctx.arc(d.x + d.w * 0.75, d.y + d.h * 0.52, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();

    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(0, -cameraY);

    drawWorldGuides();

    // Platforms
    ctx.strokeStyle = '#000';
    ctx.lineWidth   = 2;
    ctx.lineCap     = 'round';
    for (const pl of platforms()) {
        ctx.beginPath();
        ctx.moveTo(pl.x, pl.y);
        ctx.lineTo(pl.x + pl.w, pl.y);
        ctx.stroke();
    }

    drawDoor();

    if (platformDraft) {
        ctx.save();
        ctx.strokeStyle = '#2f6fbd';
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.moveTo(platformDraft.startX, platformDraft.y);
        ctx.lineTo(platformDraft.endX, platformDraft.y);
        ctx.stroke();
        ctx.restore();
    }

    // Player (y = feet position)
    drawFigure(p.x, p.y, p.dir, p.frame, !p.grounded);
    ctx.restore();

    // Confetti (screen space)
    for (const c of confetti) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, c.life);
        ctx.fillStyle = c.color;
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
        ctx.restore();
    }

    if (gameWon) {
        const t = Math.min(1, winAge / 30);
        ctx.save();
        ctx.globalAlpha = t;
        ctx.fillStyle = '#111';
        ctx.font = '18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`door reached · score ${Math.max(0, score)}`, canvas.width / 2, 38);
        ctx.restore();
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
