<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platformer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<!--
    HOW TO FIX THE JUMP:

    Open the Console (F12 → Console tab), paste this in, and press Enter:

    function applyJump() {
        if (player.onGround) {
            player.vy = -13;
            player.onGround = false;
        }
    }
-->

<canvas id="game" width="800" height="440"></canvas>

<script>
    var canvas = document.getElementById('game');
    var ctx    = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;

    var GRAVITY    = 0.5;
    var MOVE_SPEED = 4;

    var player = {
        x: 60, y: 360, w: 32, h: 40,
        vx: 0, vy: 0,
        onGround: false,
        dir: 1, moving: false
    };

    var platforms = [
        { x:   0, y: 400, w: 220, h: 40 },
        { x: 270, y: 320, w: 140, h: 20 },
        { x: 460, y: 240, w: 150, h: 20 },
        { x: 645, y: 160, w: 155, h: 20 },
    ];

    var goal = { x: 715, y: 100, w: 40, h: 60 };

    var keys = {};
    var won  = false;
    var tick = 0;

    var clouds = [
        { x:  80, y: 55, w: 110 },
        { x: 330, y: 35, w:  90 },
        { x: 570, y: 65, w: 120 },
    ];

    document.addEventListener('keydown', function(e) {
        keys[e.code] = true;
        if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
            e.preventDefault();
        if (e.code === 'KeyR' && won) {
            won = false;
            player.x = 60; player.y = 360;
            player.vx = 0; player.vy = 0;
        }
    });
    document.addEventListener('keyup', function(e) { keys[e.code] = false; });

    // applyJump is not defined — pressing jump throws a ReferenceError in the console

    function update() {
        if (won) return;
        tick++;

        player.vx = 0; player.moving = false;
        if (keys['ArrowLeft']  || keys['KeyA']) { player.vx = -MOVE_SPEED; player.dir = -1; player.moving = true; }
        if (keys['ArrowRight'] || keys['KeyD']) { player.vx =  MOVE_SPEED; player.dir =  1; player.moving = true; }
        if (keys['Space'] || keys['ArrowUp'] || keys['KeyW']) applyJump();

        player.vy += GRAVITY;
        player.x  += player.vx;
        player.y  += player.vy;
        player.onGround = false;

        for (var i = 0; i < platforms.length; i++) {
            var p = platforms[i];
            var prevBottom = player.y + player.h - player.vy;
            if (player.x + player.w > p.x &&
                player.x < p.x + p.w &&
                player.y + player.h >= p.y &&
                prevBottom <= p.y + 4 &&
                player.vy >= 0) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
            }
        }

        if (player.y + player.h > H) { player.y = H - player.h; player.vy = 0; player.onGround = true; }
        if (player.x < 0) player.x = 0;
        if (player.x + player.w > W) player.x = W - player.w;

        if (player.x + player.w > goal.x && player.x < goal.x + goal.w &&
            player.y + player.h > goal.y && player.y < goal.y + goal.h) {
            won = true;
        }

        for (var c = 0; c < clouds.length; c++) {
            clouds[c].x -= 0.25;
            if (clouds[c].x + clouds[c].w < 0) clouds[c].x = W + 60;
        }
    }

    function drawCloud(x, y, w) {
        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.beginPath();
        ctx.arc(x + w * 0.25, y,            w * 0.18, 0, Math.PI * 2);
        ctx.arc(x + w * 0.50, y - w * 0.09, w * 0.24, 0, Math.PI * 2);
        ctx.arc(x + w * 0.75, y,            w * 0.18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(x + w * 0.07, y, w * 0.86, w * 0.2);
    }

    function drawPlatform(p) {
        ctx.fillStyle = '#5d8a3c';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#7bc150';
        ctx.fillRect(p.x, p.y, p.w, 6);
        ctx.fillStyle = '#3d5e28';
        ctx.fillRect(p.x, p.y + p.h - 6, p.w, 6);
    }

    function drawGoal() {
        ctx.fillStyle = '#aaa';
        ctx.fillRect(goal.x + goal.w / 2 - 2, goal.y, 4, goal.h);
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.moveTo(goal.x + goal.w / 2 + 2,  goal.y + 4);
        ctx.lineTo(goal.x + goal.w / 2 + 30, goal.y + 16);
        ctx.lineTo(goal.x + goal.w / 2 + 2,  goal.y + 28);
        ctx.closePath();
        ctx.fill();
        var floatY = Math.sin(tick / 20) * 6;
        ctx.save();
        ctx.translate(goal.x + goal.w / 2, goal.y - 22 + floatY);
        ctx.rotate(tick / 40);
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        for (var i = 0; i < 10; i++) {
            var angle = (i * Math.PI) / 5 - Math.PI / 2;
            var r = i % 2 === 0 ? 16 : 7;
            ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    function drawPlayer() {
        var x = player.x, y = player.y, w = player.w, h = player.h;

        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.beginPath();
        ctx.ellipse(x + w / 2, y + h + 3, w / 2 + 2, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#cc4400';
        var legY = y + h - 8;
        if (player.moving && player.onGround) {
            var ph = Math.floor(tick / 7) % 2;
            ctx.fillRect(x + 4,      legY + (ph ? 4 : 0), 10, 8 - (ph ? 4 : 0));
            ctx.fillRect(x + w - 14, legY + (ph ? 0 : 4), 10, 8 - (ph ? 0 : 4));
        } else {
            ctx.fillRect(x + 4,      legY, 10, 8);
            ctx.fillRect(x + w - 14, legY, 10, 8);
        }

        ctx.fillStyle = '#ff6b35';
        ctx.fillRect(x + 2, y + 14, w - 4, h - 22);
        ctx.fillStyle = '#ff8c5a';
        ctx.fillRect(x, y, w, 18);
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x + 4, y + 3, w - 8, 10);
        ctx.fillStyle = '#00d4ff';
        ctx.fillRect(player.dir > 0 ? x + w - 14 : x + 6, y + 4, 8, 7);
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(x + w / 2 - 1, y - 8, 2, 8);
        ctx.beginPath();
        ctx.arc(x + w / 2, y - 10, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#ff4757';
        ctx.fill();
    }

    function drawWin() {
        ctx.fillStyle = 'rgba(0,0,0,0.72)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 60px Courier New';
        ctx.fillText('YOU WIN!', W / 2, H / 2 - 18);
        ctx.fillStyle = '#aaa';
        ctx.font = '15px Courier New';
        ctx.fillText('Press R to play again', W / 2, H / 2 + 30);
        ctx.textAlign = 'left';
    }

    function draw() {
        var grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#4a90d9');
        grad.addColorStop(1, '#87ceeb');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        for (var i = 0; i < clouds.length; i++) drawCloud(clouds[i].x, clouds[i].y, clouds[i].w);
        for (var i = 0; i < platforms.length; i++) drawPlatform(platforms[i]);
        drawGoal();
        drawPlayer();
        if (won) drawWin();
    }

    function loop() {
        requestAnimationFrame(loop);
        update();
        draw();
    }
    loop();
</script>
</body>
</html>
